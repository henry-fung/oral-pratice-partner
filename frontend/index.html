<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#F97316">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>口语练习助手 - Oral Practice Partner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: {
                            400: '#818CF8',
                            500: '#6366F1',
                            600: '#4F46E5',
                        },
                        background: '#0B0B0E',
                        surface: '#1A1A1E',
                        'surface-border': '#2A2A2E'
                    }
                }
            }
        }
    </script>
    <style>
        * {
            -webkit-tap-highlight-color: transparent;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: #0B0B0E;
            color: #FAFAF9;
            min-height: 100vh;
            min-height: 100dvh;
        }
        .text-gray-800 { color: #FAFAF9 !important; }
        .text-gray-700 { color: #E4E4E7 !important; }
        .text-gray-600 { color: #A1A1AA !important; }
        .text-gray-500 { color: #71717A !important; }
        .text-gray-400 { color: #52525B !important; }
        .text-gray-300 { color: #3F3F46 !important; }
        .bg-white { background-color: #1A1A1E !important; }
        .border-gray-200 { border-color: #2A2A2E !important; }
        .safe-area-inset-top {
            padding-top: env(safe-area-inset-top);
        }
        .safe-area-inset-bottom {
            padding-bottom: env(safe-area-inset-bottom);
        }
        .page-container {
            max-width: 480px;
            margin: 0 auto;
            padding: 16px;
            padding-bottom: 80px;
        }
        .card {
            background: #1A1A1E;
            border-radius: 12px;
            border: 1px solid #2A2A2E;
            padding: 16px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #6366F1 0%, #4F46E5 100%);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 14px 24px;
            font-size: 16px;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            transition: transform 0.1s;
        }
        .btn-primary:active {
            transform: scale(0.98);
        }
        .btn-secondary {
            background: #1A1A1E;
            color: #FAFAF9;
            border: 1px solid #2A2A2E;
            border-radius: 12px;
            padding: 14px 24px;
            font-size: 16px;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            transition: transform 0.1s;
        }
        .btn-secondary:active {
            transform: scale(0.98);
        }
        .input-field {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #2A2A2E;
            border-radius: 12px;
            font-size: 16px;
            background: #1A1A1E;
            color: #FAFAF9;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }
        .input-field:focus {
            outline: none;
            border-color: #6366F1;
        }
        .role-card {
            background: #1A1A1E;
            border: 2px solid #2A2A2E;
            border-radius: 20px;
            padding: 16px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .role-card.selected {
            border-color: #6366F1;
            background: #1A1A1E;
        }
        .language-btn {
            background: #1A1A1E;
            border: 1px solid #2A2A2E;
            border-radius: 8px;
            padding: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .language-btn.selected {
            border-color: #6366F1;
            background: #1A1A1E;
        }
        .scenario-card {
            background: #1A1A1E;
            border: 1px solid #2A2A2E;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: transform 0.1s;
        }
        .scenario-card:active {
            transform: scale(0.98);
        }
        .scenario-card.selected {
            border-color: #6366F1;
        }
        .answer-card {
            background: linear-gradient(135deg, #1E1E24 0%, #2A2A2E 100%);
            border-radius: 12px;
            padding: 20px;
            margin-top: 16px;
            border: 1px solid #2A2A2E;
        }
        .word-tag {
            display: inline-block;
            background: #1A1A1E;
            border: 1px solid #2A2A2E;
            border-radius: 6px;
            padding: 4px 8px;
            margin: 2px;
            cursor: pointer;
            font-size: 14px;
            color: #FAFAF9;
        }
        .word-tag:active {
            background: #6366F1;
            border-color: #6366F1;
        }
        .tab-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #1A1A1E;
            border-top: 1px solid #2A2A2E;
            padding: 8px 16px;
            padding-bottom: max(8px, env(safe-area-inset-bottom));
            display: flex;
            justify-content: space-around;
        }
        .tab-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #71717A;
            font-size: 12px;
            cursor: pointer;
            padding: 4px 12px;
        }
        .tab-item.active {
            color: #6366F1;
        }
        .tab-icon {
            font-size: 24px;
            margin-bottom: 2px;
        }
        .hidden {
            display: none !important;
        }
        .fade-in {
            animation: fadeIn 0.3s ease-in;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.1);
            border-radius: 50%;
            border-top-color: #6366F1;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .toast {
            background: #27272A;
            color: #FAFAF9;
            border: 1px solid #3F3F46;
        }
    </style>
</head>
<body>
    <div id="app" class="safe-area-inset-top">
        <!-- 动态内容 -->
    </div>

    <!-- Toast 提示 -->
    <div id="toast" class="fixed top-4 left-1/2 transform -translate-x-1/2 z-50 hidden">
        <div class="bg-gray-800 text-white px-4 py-2 rounded-lg text-sm toast"></div>
    </div>

    <script src="js/storage.js"></script>
    <script src="js/api.js"></script>
    <script src="js/router.js"></script>
    <script src="js/pages/auth.js"></script>
    <script src="js/pages/profile.js"></script>
    <script src="js/pages/scenarios.js"></script>
    <script src="js/pages/practice.js"></script>
    <script src="js/pages/vocabulary.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
